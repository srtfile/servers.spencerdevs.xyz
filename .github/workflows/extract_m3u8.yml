name: Extract M3U8 Links

on:
  workflow_dispatch:
    inputs:
      movie_id:
        description: "Movie ID (e.g. 254)"
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Run extractor
        run: python extract_movies.py "${{ github.event.inputs.movie_id }}"